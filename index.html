<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DOM - Louis</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="header">
    <h1 id="hz">Playground DOM & API</h1>
    <img id="js" src="js.png">
  </div>
  <p id="pe">- Louis</p>

  <div id="container">

    <div class="card">
      <button id="btn1">História Chapeuzinho</button>
      <p id="text"></p>
      <button id="btn2">História Lobo</button>
      <p id="text2"></p>
      <button id="btn3">Arquivo estranho</button>
      <p id="text3"></p>
    </div>

    <div class="card">
      <button id="btn4">Piada</button>
      <p id="text4"></p>
    </div>

    <div class="card">
      <button id="btn5">Cachorro 🐶</button>
      <img id="img">
    </div>

    <div class="card">
      <button id="btn6">Fato aleatório</button>
      <p id="text5"></p>
    </div>

    <div class="card">
      <button id="btn7">Seu sistema</button>
      <p id="text6"></p>
    </div>

    <div class="card">
      <h2>Analisador de nicknames</h2>
      <input id="input1" placeholder="Digite seu nome">
      <button id="analisador">Analisar</button>
      <p id="textEsp"></p>
    </div>

    <div class="card">
      <h2>Lista de tarefas</h2>
      <input id="input2" placeholder="Nova tarefa">
      <button id="btnEsp">Adicionar</button>
      <ul id="lista"></ul>
      <p id="error"></p>
    </div>

    <div class="card">
      <h2>Estudando Fetch async</h2>
      <button id="btnFetch">Puxar uma mensagem</button>
      <p id="errorFetch"></p>
      <p id="resultado"></p>
    </div>

    <div class="card">
      <button id="btnxi">Clique aqui!</button>
      <p id="p1"></p>
      <p id="p2"></p>
      <p id="p3"></p>
      <p id="p4"></p>
      <p id="p5"></p>
      <p id="p6"></p>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
