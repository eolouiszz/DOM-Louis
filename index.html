<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DOM - Louis</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>Playground DOM & API 🚀</h1>
  <p id="pe">- Louis</p>

  <div id="container">

    <div class="card">
      <button id="btn1">História Chapeuzinho</button>
      <p id="text"></p>

      <button id="btn2">História Lobo</button>
      <p id="text2"></p>

      <button id="btn3">Arquivo estranho</button>
      <p id="text3"></p>
    </div>

    <div class="card">
      <button id="btn4">Piada</button>
      <p id="text4"></p>
    </div>

    <div class="card">
      <button id="btn5">Cachorro 🐶</button>
      <img id="img">
    </div>

    <div class="card">
      <button id="btn6">Fato aleatório</button>
      <p id="text5"></p>
    </div>

    <div class="card">
      <button id="btn7">Seu sistema</button>
      <p id="text6"></p>
    </div>

    <div class="card">
      <input id="input1" placeholder="Digite seu nome">
      <button id="analisador">Analisar</button>
      <p id="textEsp"></p>
    </div>

    <div class="card">
      <h2>Lista de tarefas</h2>
      <input id="input2" placeholder="Nova tarefa">
      <button id="btnEsp">Adicionar</button>
      <ul id="lista"></ul>
      <p id="error"></p>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
